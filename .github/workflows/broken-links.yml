name: broken-links

on:
  schedule:
    - cron: "0 6 1 * *"
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "spec/**/*.md"
      - "platforms/**/*.md"
      - ".github/workflows/broken-links.yml"
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --accept 200,206,302,403,429
            --exclude-mail
            --exclude 'mailto:'
            --exclude 'localhost'
            --exclude 'example\.com'
            --exclude 'example\.org'
            --exclude 'universal-spawn\.(dev|org)'
            README.md docs/**/*.md spec/**/*.md platforms/**/*.md
          fail: true
