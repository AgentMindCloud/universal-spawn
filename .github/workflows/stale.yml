name: stale

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 45
          days-before-issue-close: 60
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "status/needs-info"
          stale-pr-label: "status/needs-info"
          exempt-issue-labels: "rfc,good-first-issue,help-wanted,breaking,spec/v1.0,spec/v1.1"
          exempt-pr-labels: "rfc,good-first-issue,help-wanted,breaking"
          stale-issue-message: >
            This issue has been quiet for 45 days. It will be closed in
            another 15 days unless there is activity. If this is still
            relevant, please leave a comment with more detail.
          stale-pr-message: >
            This PR has been quiet for 30 days. It will be closed in
            14 more days unless there is activity.
          close-issue-message: >
            Closing for inactivity. Please reopen with updated detail
            if the issue is still live.
          close-pr-message: >
            Closing for inactivity. Feel free to reopen when ready.
          remove-stale-when-updated: true
          operations-per-run: 50
