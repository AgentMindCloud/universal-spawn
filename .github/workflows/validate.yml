name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schema:
    name: Validate all manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validator
        run: pip install jsonschema pyyaml
      - name: Validate
        run: python scripts/validate.py
