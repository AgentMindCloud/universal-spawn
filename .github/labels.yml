# Canonical label set for universal-spawn.
#
# Apply with the `github/labeler` action or `crazy-max/ghaction-github-labeler`.
# Colors are hex without the leading `#`.

# ─── Platform ────────────────────────────────────────────────────────────────
- name: "platform/claude"
  color: "c08a62"
  description: "Touches the Claude platform extension."
- name: "platform/gemini"
  color: "4b6fa5"
  description: "Touches the Gemini platform extension."
- name: "platform/openai"
  color: "10a37f"
  description: "Touches the OpenAI platform extension."
- name: "platform/vercel"
  color: "111111"
  description: "Touches the Vercel platform extension."
- name: "platform/netlify"
  color: "2ea3b2"
  description: "Touches the Netlify platform extension."
- name: "platform/unity"
  color: "222c37"
  description: "Touches the Unity platform extension."
- name: "platform/figma"
  color: "a259ff"
  description: "Touches the Figma platform extension."
- name: "platform/discord"
  color: "5865f2"
  description: "Touches the Discord platform extension."
- name: "platform/huggingface"
  color: "ffcf5b"
  description: "Touches the Hugging Face platform extension."

# ─── Type ────────────────────────────────────────────────────────────────────
- name: "type/bug"
  color: "d73a4a"
  description: "A defect in the spec, schema, or extension."
- name: "type/feature"
  color: "0e8a16"
  description: "Additive proposal for a future minor release."
- name: "type/docs"
  color: "0366d6"
  description: "Documentation changes only."
- name: "type/spec"
  color: "7057ff"
  description: "Normative spec or schema change."
- name: "type/chore"
  color: "c5def5"
  description: "Repository maintenance, deps, CI."

# ─── Status ──────────────────────────────────────────────────────────────────
- name: "status/triage"
  color: "ededed"
  description: "Newly opened, awaiting first review."
- name: "status/in-progress"
  color: "fbca04"
  description: "Actively being worked on."
- name: "status/blocked"
  color: "b60205"
  description: "Blocked on an upstream or external dependency."
- name: "status/needs-info"
  color: "cccccc"
  description: "Waiting for the author to provide more detail."

# ─── Spec version ────────────────────────────────────────────────────────────
- name: "spec/v1.0"
  color: "1d76db"
  description: "Applies to the v1.0 specification."
- name: "spec/v1.1"
  color: "0052cc"
  description: "Targets the v1.1 specification."

# ─── Meta ────────────────────────────────────────────────────────────────────
- name: "good-first-issue"
  color: "7057ff"
  description: "Suitable for a first-time contributor."
- name: "help-wanted"
  color: "008672"
  description: "Extra attention is needed."
- name: "rfc"
  color: "e99695"
  description: "Formal RFC under discussion."
- name: "breaking"
  color: "b60205"
  description: "Introduces a breaking change; will bump a major spec version."
- name: "dependencies"
  color: "0366d6"
  description: "Pull requests that update dependencies."
