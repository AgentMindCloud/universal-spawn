blank_issues_enabled: false
contact_links:
  - name: Questions and design discussion
    url: https://github.com/AgentMindCloud/universal-spawn/discussions
    about: |
      Ask how to express something, propose an idea, or share a creation.
      Questions opened as issues will be converted to discussions.
  - name: Security vulnerability (private disclosure)
    url: https://github.com/AgentMindCloud/universal-spawn/security/advisories/new
    about: |
      Report a security issue privately. Do NOT open a public issue for
      a vulnerability. See SECURITY.md for scope and SLAs.
  - name: Code of conduct concern
    url: mailto:conduct@agentmindcloud.org
    about: |
      Private reports about conduct in this project's spaces. See
      CODE_OF_CONDUCT.md.
