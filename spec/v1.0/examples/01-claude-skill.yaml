# Example 01 — Anthropic Claude skill
# Smallest useful Claude skill: cites quoted sources in a long-form
# response. Zero network access, runs inside Claude's sandbox.
version: "1.0"
name: Citations
type: ai-skill
summary: Attach numbered citation footnotes to a draft response.
description: >
  A Claude Skill that inspects an assistant draft and, for each factual
  claim, attaches a numbered citation referencing the conversation's
  quoted sources. Runs entirely inside the Claude sandbox.

platforms:
  claude:
    skill_type: skill
    skill_file: skill.yaml
    model: claude-sonnet-4-6
    surface: [claude-app, claude-api, claude-code]
    prompt_cache: true

safety:
  min_permissions: []
  safe_for_auto_spawn: true

env_vars_required: []

metadata:
  license: Apache-2.0
  author:
    name: Citations Co.
    handle: citations-co
    url: https://github.com/citations-co
  source:
    type: git
    url: https://github.com/citations-co/claude-skill-citations
    branch: main
  keywords: [claude, skill, citations, long-form]
  categories: [ai, writing]
