version: "1.0"
name: GCP Template
type: api-service
description: Template for a GCP-targeted universal-spawn manifest.

platforms:
  gcp:
    runtime: cloud_run
    project_id: your-project
    region: us-central1
    cloud_run:
      service_name: hello
      image: us-central1-docker.pkg.dev/your-project/images/hello:latest
      port: 8080
      cpu: "1"
      memory: 512Mi
      concurrency: 80
      min_instances: 0
      max_instances: 10
      ingress: all
      allow_unauthenticated: true

safety:
  min_permissions: [network:inbound, network:outbound]

env_vars_required:
  - name: API_SECRET
    description: Stored in Secret Manager.
    secret: true

deployment:
  targets: [gcp]

metadata:
  license: Apache-2.0
  author: { name: Your Name, handle: yourhandle }
  source: { type: git, url: https://github.com/yourhandle/gcp-template }
