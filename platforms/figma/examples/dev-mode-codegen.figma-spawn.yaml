spawn_version: "1.0.0"
id: com.example.figma-codegen-swift
name: Swift Codegen
kind: creative-tool
summary: Figma Dev Mode codegen plugin that emits SwiftUI.
description: >
  A Figma Dev Mode codegen plugin that converts selected frames into
  SwiftUI views. Uses the Dev Mode API with `codegen` and `inspect`
  capabilities. Requires network access to a licensing server.
license: proprietary
author:
  name: Codegen Co.
  handle: codegen-co
  org: Codegen
source:
  type: git
  url: https://github.com/codegen-co/figma-swift
keywords: [figma, dev-mode, codegen, swiftui]
categories: [graphics, code, devtools]
runtime:
  language: typescript
  os: [any]
  arch: [any]
  network_required: true
entrypoints:
  - id: codegen
    kind: script
    label: Codegen entry
    ref: src/code.ts
min_permissions:
  - network:outbound:license.codegen.example
safe_for_auto_spawn: false
platforms:
  figma:
    manifest_file: figma.manifest.json
    editor_type: [figma, dev]
    network_access: allowed-hosts
    allowed_hosts: ["license.codegen.example"]
    capabilities: [codegen, inspect]
spawn_targets: [figma]
