# claude-spawn.yaml — canonical Claude-targeted manifest
# Replace placeholders. The platforms.claude block is required.
version: "1.0"
name: Claude Template
type: ai-skill
description: Template for a Claude-targeted universal-spawn manifest.

platforms:
  claude:
    skill_type: subagent
    model: claude-opus-4-7
    surface: [claude-api, claude-code]
    tools:
      - name: do_work
        function_ref: tools/do_work.json
    prompt_cache: true
    thinking:
      type: enabled
      budget_tokens: 8192

safety:
  min_permissions:
    - network:outbound:api.anthropic.com
    - model:call:claude-opus-4-7
  rate_limit_qps: 3
  cost_limit_usd_daily: 5
  safe_for_auto_spawn: false

env_vars_required:
  - name: ANTHROPIC_API_KEY
    description: Anthropic API key.
    secret: true

deployment:
  targets: [claude]

metadata:
  license: Apache-2.0
  author: { name: Your Name, handle: yourhandle }
  source: { type: git, url: https://github.com/yourhandle/claude-template }
  categories: [ai]
