version: "1.0"
name: LangChain Template
type: ai-agent
description: Template for a LangChain-targeted universal-spawn manifest.

platforms:
  langchain:
    language: python
    provider: anthropic
    model: claude-sonnet-4-6
    entry_chain:
      file: app/chain.py
      symbol: chain
    retriever:
      kind: vector
      vector_store: chroma
      embeddings_model: text-embedding-3-small
      top_k: 5
    langsmith_tracing: true
    langsmith_project: your-project

safety:
  min_permissions: [network:outbound:api.anthropic.com, network:outbound:api.openai.com]
  rate_limit_qps: 3
  cost_limit_usd_daily: 5

env_vars_required:
  - name: ANTHROPIC_API_KEY
    description: Anthropic API key.
    secret: true
  - name: OPENAI_API_KEY
    description: OpenAI API key used for embeddings.
    secret: true
  - name: LANGCHAIN_API_KEY
    description: LangSmith API key.
    required: false
    secret: true

deployment:
  targets: [langchain]

metadata:
  license: Apache-2.0
  author: { name: Your Name, handle: yourhandle }
  source: { type: git, url: https://github.com/yourhandle/langchain-template }
