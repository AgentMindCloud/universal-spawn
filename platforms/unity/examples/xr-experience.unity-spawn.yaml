spawn_version: "1.0.0"
id: com.example.unity-xr-gallery
name: XR Gallery
kind: game-world
summary: An OpenXR-based gallery environment for VR headsets.
description: >
  A small OpenXR gallery environment that loads as a standalone Unity
  scene. Requires XR loaders and targets Android (Quest) and Windows
  standalone. Demonstrates the `xr` block of the Unity extension.
license: Apache-2.0
author:
  name: Gallery Co.
  handle: gallery-co
source:
  type: git
  url: https://github.com/gallery-co/unity-xr-gallery
keywords: [unity, xr, openxr, vr, gallery]
categories: [gaming, graphics]
runtime:
  language: c-sharp
  engines:
    unity: ">=2023.2"
  os: [windows, android]
  arch: [x86_64, arm64]
  gpu_required: true
  memory_mb_min: 4096
entrypoints:
  - id: scene
    kind: scene
    label: Gallery
    ref: Assets/Scenes/Gallery.unity
min_permissions:
  - fs:read
  - gpu:compute
platforms:
  unity:
    target_version: "2023.2"
    render_pipeline: urp
    scripting_backend: il2cpp
    entry_scene: Assets/Scenes/Gallery.unity
    packages:
      - com.unity.xr.openxr
      - com.unity.render-pipelines.universal
    defines: [ENABLE_XR, ENABLE_PARCHMENT]
    target_platforms: [standalone-windows, android]
    xr:
      required: true
      loaders: [openxr, oculus]
spawn_targets: [unity]
