version: "1.0"
name: Rust CLI Tool
description: >
  A Rust CLI distributed via crates.io. Binary crate; Rust 2024
  edition; MSRV 1.80. Pairs with Cargo.toml; both files coexist.
type: cli-tool

platforms:
  crates-io:
    crate_name: your_cli
    edition: "2024"
    msrv: "1.80"
    shape: bin

safety:
  min_permissions: [fs:read]
  safe_for_auto_spawn: false

env_vars_required: []

deployment:
  targets: [crates-io]

metadata:
  license: Apache-2.0
  author: { name: Your Name, handle: yourhandle }
  source: { type: git, url: https://github.com/yourhandle/rust-cli }
