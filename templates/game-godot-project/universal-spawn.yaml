version: "1.0"
name: Godot Project Starter
description: >
  A Godot 4 project starter with one scene and the Forward+ renderer.
  Includes a parchment-tinted demo scene as the entry point.
type: game-world

platforms:
  godot:
    kind: project
    engine_series: "4"
    renderer: forward+
    entry_scene: scenes/main.tscn

safety:
  min_permissions: [fs:read, gpu:compute]
  safe_for_auto_spawn: true

env_vars_required: []

deployment:
  targets: [godot]

metadata:
  license: MIT
  author: { name: Your Studio, handle: your-studio }
  source: { type: git, url: https://github.com/your-studio/godot-starter }
