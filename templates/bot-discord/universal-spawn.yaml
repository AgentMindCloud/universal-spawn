version: "1.0"
name: Discord Bot
description: >
  A plain Discord bot. One /ping slash command. Replace
  application_id and permissions integer with your own.
type: bot

platforms:
  discord:
    application_id: "111111111111111111"
    scopes: [bot, applications.commands]
    intents: [guilds]
    permissions: "2147483648"
    slash_commands: [commands/ping.json]

safety:
  min_permissions:
    - network:outbound:discord.com
    - network:outbound:gateway.discord.gg
  safe_for_auto_spawn: false

env_vars_required:
  - { name: DISCORD_BOT_TOKEN, description: Discord bot token, secret: true }

deployment:
  targets: [discord]

metadata:
  license: Apache-2.0
  author: { name: Your Name, handle: yourhandle }
  source: { type: git, url: https://github.com/yourhandle/discord-bot }
