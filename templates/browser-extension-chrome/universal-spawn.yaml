version: "1.0"
name: Chrome Extension
description: >
  A Chrome Manifest V3 extension. Side-panel UI; activeTab + storage
  permissions only. Replace web_store_id after publishing.
type: extension

platforms:
  chrome-extension:
    manifest_version: 3
    permissions: [activeTab, sidePanel, storage]
    service_worker: background.js
    min_chrome_version: "120"

safety:
  min_permissions: []
  safe_for_auto_spawn: true

env_vars_required: []

deployment:
  targets: [chrome-extension]

metadata:
  license: MIT
  author: { name: Your Name, handle: yourhandle }
  source: { type: git, url: https://github.com/yourhandle/chrome-extension }
