version: "1.0"
name: HF Spaces Demo
description: >
  A Hugging Face Space that ships a Gradio demo on the zero-GPU
  tier. Public visibility. Replace `front_matter.title` and your
  org/handle before publishing.
type: web-app

platforms:
  huggingface-spaces:
    sdk: gradio
    visibility: public
    hardware: zero-gpu
    front_matter:
      title: Your Demo
      pinned: false
      license: apache-2.0

safety:
  min_permissions: [network:inbound]
  safe_for_auto_spawn: true

env_vars_required:
  - { name: HF_TOKEN, description: HF token used to publish the Space, secret: true }

deployment:
  targets: [huggingface-spaces]

metadata:
  license: Apache-2.0
  author: { name: Your Name, handle: yourhandle }
  source: { type: git, url: https://github.com/yourhandle/hf-space }
