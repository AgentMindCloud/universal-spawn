spawn_version: "1.0.0"
id: com.example.unity-parchment-biome
name: Parchment Biome
kind: game-mod
summary: Unity mod that adds a parchment-themed biome and terrain shader.
description: >
  A Unity game mod that introduces a parchment-textured biome with
  matching terrain shader and ambient audio bed. Ships a scene
  entrypoint that the host game can load directly.
license: MIT
author:
  name: Biome Team
  handle: biome-team
source:
  type: git
  url: https://github.com/biome-team/parchment-biome
keywords: [unity, mod, biome, shader, parchment]
categories: [gaming, graphics]
runtime:
  language: c-sharp
  engines:
    unity: ">=2023.2 <2024"
  os: [windows, macos, linux]
  arch: [x86_64, arm64]
  gpu_required: true
  memory_mb_min: 2048
  disk_mb_min: 400
entrypoints:
  - id: scene
    kind: scene
    label: Parchment Biome scene
    ref: Assets/Scenes/ParchmentBiome.unity
  - id: install
    kind: script
    label: Package installer
    ref: Editor/Install.cs
min_permissions:
  - fs:read
  - fs:write
  - gpu:compute
platforms:
  unity:
    target_version: "2023.2"
    render_pipeline: hdrp
    scripting_backend: il2cpp
    entry_scene: Assets/Scenes/ParchmentBiome.unity
    packages:
      - "com.unity.render-pipelines.high-definition"
spawn_targets: [unity]
