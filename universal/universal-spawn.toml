version = "1.0"
name = "Your Creation"
type = "cli-tool"
description = "Replace this text with a real description. State what the creation does, for whom, and what distinguishes it. Observational prose beats marketing prose.\n"
summary = "One-line summary for cards."
homepage = "https://example.com"

[safety]
min_permissions = []
rate_limit_qps = 1
cost_limit_usd_daily = 0
safe_for_auto_spawn = false
data_residency = [
    "any",
]

[deployment]
targets = [
    "github",
]
regions = []

[deployment.build]
command = ""
output = ""
engine = ""

[[env_vars_required]]
name = "EXAMPLE_API_KEY"
description = "Example secret token used by this creation."
required = true
secret = true
example = "sk_live_..."

[visuals]
icon = "assets/icon.svg"
hero_plate = "assets/hero.svg"
palette = "parchment"

[metadata]
license = "Apache-2.0"
maintainers = [
    { name = "Co-maintainer Name", handle = "comaintainer" },
]
keywords = [
    "your",
    "keywords",
    "here",
]
categories = [
    "devtools",
]
id = "com.yourdomain.your-creation"

[metadata.author]
name = "Your Name"
handle = "yourhandle"
url = "https://github.com/yourhandle"

[metadata.source]
type = "git"
url = "https://github.com/yourhandle/your-creation"
branch = "main"
path = "."
